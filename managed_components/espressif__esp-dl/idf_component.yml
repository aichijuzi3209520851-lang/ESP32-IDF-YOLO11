dependencies:
  espressif/dl_fft: '>=0.3.1'
  espressif/esp-dsp: ==1.8.0
  espressif/esp_new_jpeg: ^1
  idf:
    matches:
    - if: target in ["esp32", "esp32c2", "esp32c3", "esp32c6", "esp32p4", "esp32s2",
        "esp32s3"]
      version: '>=5.3'
    - if: target == esp32c5
      version: '>=5.5'
description: esp-dl is a lightweight and efficient neural network inference framework
  designed specifically for ESP series chips.
license: MIT
repository: git://github.com/espressif/esp-dl.git
repository_info:
  commit_sha: 165e966ea69410c332f9cafc452a15d3784436b0
  path: esp-dl
targets:
- esp32
- esp32c2
- esp32c3
- esp32c5
- esp32c6
- esp32p4
- esp32s2
- esp32s3
- esp32s31
url: https://github.com/espressif/esp-dl/tree/master/esp-dl
version: 3.3.3
